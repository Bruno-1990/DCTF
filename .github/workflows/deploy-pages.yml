name: Deploy Frontend to GitHub Pages

on:
  push:
    branches:
      - master
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL || 'https://your-backend-url.com/api' }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          echo "Building frontend..."
          echo "Current directory: $(pwd)"
          echo "GITHUB_REPOSITORY: $GITHUB_REPOSITORY"
          echo "VITE_API_BASE_URL: $VITE_API_BASE_URL"
          echo "Running vite build directly (skipping tsc)..."
          npx vite build --mode production
          echo "Build step completed!"

      - name: Verify build output
        run: |
          echo "Current directory:"
          pwd
          echo "Checking if dist folder exists in frontend..."
          if [ -d "frontend/dist" ]; then
            echo "✅ dist folder found!"
            echo "Contents of frontend/dist:"
            ls -la frontend/dist/
            echo "Checking for index.html..."
            if [ -f "frontend/dist/index.html" ]; then
              echo "✅ index.html found!"
            else
              echo "❌ ERROR: index.html not found in frontend/dist/"
              echo "Looking for HTML files..."
              find frontend/dist -name "*.html" || echo "No HTML files found!"
            fi
          else
            echo "❌ ERROR: frontend/dist folder not found!"
            echo "Checking if frontend folder exists..."
            ls -la frontend/ || echo "Frontend folder not found!"
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './frontend/dist'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4


