<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Logs - DCTF MPC Monitor</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: 'Consolas', 'Monaco', monospace;
      background: #1e1e1e;
      color: #d4d4d4;
      padding: 20px;
    }
    
    h2 {
      color: #4ec9b0;
      margin-bottom: 20px;
      font-size: 20px;
    }
    
    .logs-container {
      background: #252526;
      border: 1px solid #3e3e42;
      border-radius: 8px;
      padding: 15px;
      max-height: 350px;
      overflow-y: auto;
    }
    
    .log-entry {
      padding: 8px 0;
      border-bottom: 1px solid #2d2d30;
      font-size: 13px;
      line-height: 1.6;
    }
    
    .log-entry:last-child {
      border-bottom: none;
    }
    
    .log-time {
      color: #858585;
      margin-right: 10px;
    }
    
    .log-status-online {
      color: #4ec9b0;
    }
    
    .log-status-offline {
      color: #f48771;
    }
    
    .log-status-info {
      color: #569cd6;
    }
    
    .empty-logs {
      text-align: center;
      color: #858585;
      padding: 40px;
    }
  </style>
</head>
<body>
  <h2>📊 Logs do Monitor</h2>
  <div class="logs-container" id="logsContainer">
    <div class="empty-logs">Nenhum log disponível ainda. Os logs aparecerão aqui conforme o monitor verifica o serviço.</div>
  </div>
  
  <script>
    // Simular logs (em produção, você pode implementar um sistema de logs real)
    const logs = [
      { time: new Date().toLocaleString('pt-BR'), status: 'info', message: 'Monitor iniciado' },
      { time: new Date().toLocaleString('pt-BR'), status: 'online', message: 'Serviço verificado - Online' }
    ];
    
    function renderLogs() {
      const container = document.getElementById('logsContainer');
      if (logs.length === 0) {
        container.innerHTML = '<div class="empty-logs">Nenhum log disponível</div>';
        return;
      }
      
      container.innerHTML = logs.map(log => `
        <div class="log-entry">
          <span class="log-time">[${log.time}]</span>
          <span class="log-status-${log.status}">${log.message}</span>
        </div>
      `).join('');
      
      // Scroll para o final
      container.scrollTop = container.scrollHeight;
    }
    
    renderLogs();
  </script>
</body>
</html>
